<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DocDouble × Briffey — Guest List</title>
<meta name="description" content="Get on the guest list for DocDouble x Briffey at Kashmir, West Loop — Friday April 17, 2026.">
<meta property="og:title" content="DocDouble × Briffey — Guest List">
<meta property="og:description" content="Friday April 17 · Kashmir · West Loop · Chicago">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23060a09'/%3E%3Ctext x='32' y='42' font-family='Arial,sans-serif' font-size='28' font-weight='900' fill='%233dffc0' text-anchor='middle'%3EDD%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #060a09;
    --surface: #0a0f0d;
    --card: #0f1612;
    --border: rgba(255,255,255,0.06);
    --border-bright: rgba(180,230,200,0.2);
    --accent1: #3dffc0;
    --accent2: #00a878;
    --accent3: #e8f5ee;
    --warn: #ffcc44;
    --text: #dff0e8;
    --muted: #5a7a6a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow-x: hidden; }
  body::after { content: ''; position: fixed; inset: 0; z-index: 1001; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); opacity: 0.4; }

  .scene {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }
  .or-ceiling { position: absolute; inset: 0; background-image: linear-gradient(rgba(61,255,192,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(61,255,192,0.02) 1px, transparent 1px); background-size: 80px 80px; z-index: 0; }
  .spotlight { position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 800px; height: 600px; background: radial-gradient(ellipse 55% 70% at 50% 0%, rgba(61,255,192,0.08) 0%, rgba(0,168,120,0.03) 50%, transparent 100%); z-index: 1; pointer-events: none; }
  .corner { position: absolute; width: 24px; height: 24px; opacity: 0.35; }
  .corner.tl { top: 1.5rem; left: 1.5rem; border-top: 1px solid var(--accent1); border-left: 1px solid var(--accent1); }
  .corner.tr { top: 1.5rem; right: 1.5rem; border-top: 1px solid var(--accent1); border-right: 1px solid var(--accent1); }
  .corner.bl { bottom: 1.5rem; left: 1.5rem; border-bottom: 1px solid var(--accent1); border-left: 1px solid var(--accent1); }
  .corner.br { bottom: 1.5rem; right: 1.5rem; border-bottom: 1px solid var(--accent1); border-right: 1px solid var(--accent1); }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 520px;
    text-align: center;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }
  h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(2.2rem, 7vw, 3.4rem);
    line-height: 1;
    letter-spacing: 0.02em;
    background: linear-gradient(160deg, var(--accent3) 0%, var(--accent1) 55%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 25px rgba(61,255,192,0.3));
    opacity: 0;
    animation: fadeUp 0.7s 0.35s forwards;
    margin-bottom: 0.5rem;
  }
  h1 .x { color: var(--accent1); -webkit-text-fill-color: var(--accent1); }
  .divider { width: 80px; height: 1px; background: linear-gradient(to right, transparent, var(--accent1), transparent); margin: 1.2rem auto; opacity: 0; animation: fadeUp 0.6s 0.5s forwards; }

  .info {
    opacity: 0;
    animation: fadeUp 0.6s 0.55s forwards;
    margin-bottom: 2.2rem;
  }
  .info-row {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .info-row strong { color: var(--text); font-weight: 700; }

  .setlist {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.65s forwards;
    flex-wrap: wrap;
  }
  .set {
    padding: 0.45rem 0.9rem;
    border: 1px solid var(--border-bright);
    background: rgba(61,255,192,0.03);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent1);
  }
  .set .artist { color: var(--text); margin-right: 0.35rem; }

  .card {
    background: var(--card);
    border: 1px solid var(--border-bright);
    padding: 2rem 1.5rem;
    position: relative;
    opacity: 0;
    animation: fadeUp 0.6s 0.75s forwards;
  }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent1), transparent); }
  .card-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 1.2rem;
  }

  .input-wrap { position: relative; margin-bottom: 1.2rem; }
  .input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    padding: 1rem 1.2rem;
    letter-spacing: 0.08em;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }
  .input::placeholder { color: var(--muted); }
  .input:focus { border-color: var(--accent1); background: rgba(61,255,192,0.03); }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    width: 100%;
    padding: 1rem 2rem;
    background: var(--accent1);
    color: var(--bg);
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    border: none;
    border-radius: 0;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(61,255,192,0.3);
    transition: all 0.2s;
  }
  .btn:hover:not(:disabled) { background: #fff; box-shadow: 0 0 40px rgba(61,255,192,0.55); transform: translateY(-1px); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    margin-top: 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    min-height: 1.2rem;
  }
  .status.err { color: #ff6666; }
  .status.ok { color: var(--accent1); }

  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    text-align: center;
    padding: 1rem 0;
  }
  .success.show { display: flex; }
  .checkmark {
    width: 56px;
    height: 56px;
    border: 2px solid var(--accent1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent1);
    font-size: 1.6rem;
    box-shadow: 0 0 25px rgba(61,255,192,0.4);
  }
  .success-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent1);
  }
  .success-msg {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .footer {
    margin-top: 2rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: fadeUp 0.6s 1s forwards;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .live-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--warn);
    border-radius: 50%;
    margin-right: 0.5rem;
    animation: pulse 2s infinite;
  }

  @media (max-width: 520px) {
    .scene { padding: 1.5rem; }
    .corner { display: none; }
    .card { padding: 1.5rem 1.2rem; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="or-ceiling"></div>
  <div class="spotlight"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="container">
    <p class="eyebrow">Friday · April 17 · 2026</p>
    <h1>DOC<span class="x">×</span>BRIFFEY</h1>
    <div class="divider"></div>

    <div class="info">
      <div class="info-row"><strong>Kashmir</strong> · West Loop</div>
      <div class="info-row">10 PM &mdash; 2 AM</div>
    </div>

    <div class="setlist">
      <div class="set"><span class="artist">DocDouble</span>10P &mdash; 12A</div>
      <div class="set"><span class="artist">Briffey</span>12A &mdash; 2A</div>
    </div>

    <div class="card">
      <form id="glForm">
        <p class="card-label"><span class="live-dot"></span>Guest List &mdash; Open</p>
        <div class="input-wrap">
          <input id="nameInput" class="input" type="text" name="name" placeholder="Your full name" autocomplete="name" maxlength="100" required />
        </div>
        <button class="btn" type="submit" id="submitBtn">Add Me &rarr;</button>
        <div class="status" id="status"></div>
      </form>
      <div class="success" id="success">
        <div class="checkmark">&check;</div>
        <div class="success-title">You're In</div>
        <div class="success-msg">See you on the floor</div>
      </div>
    </div>

    <div class="footer">@docdoublemusic &nbsp;·&nbsp; @briffey</div>
  </div>
</div>

<script>
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbxtxoYN302zep22Z5ZN4uxL7g9-RAJKaDK9ree7NOICJpxiWTHPPF9GoCrtdDOYgm7jDQ/exec';

const form = document.getElementById('glForm');
const nameInput = document.getElementById('nameInput');
const btn = document.getElementById('submitBtn');
const status = document.getElementById('status');
const success = document.getElementById('success');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = nameInput.value.trim();
  if (!name) { status.textContent = 'Name required'; status.className = 'status err'; return; }
  btn.disabled = true;
  status.textContent = 'Checking you in...';
  status.className = 'status';
  try {
    const body = new URLSearchParams({ name: name });
    const res = await fetch(ENDPOINT, { method: 'POST', body: body });
    const data = await res.json();
    if (data && data.ok) {
      form.style.display = 'none';
      success.classList.add('show');
    } else {
      throw new Error((data && data.error) || 'Submission failed');
    }
  } catch (err) {
    status.textContent = 'Network error — try again';
    status.className = 'status err';
    btn.disabled = false;
  }
});
</script>

</body>
</html>
